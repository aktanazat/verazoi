services:
  - type: web
    name: verazoi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: verazoi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: verazoi-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://verazoi.com
      - key: CORS_ORIGINS
        value: https://verazoi.com,https://www.verazoi.com,https://verazoi.pages.dev
      - key: ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
  - type: redis
    name: verazoi-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: verazoi-db
    plan: free
    databaseName: verazoi
    user: verazoi
