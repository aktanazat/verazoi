name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - infra/cf/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: infra/cf
      - name: Deploy Worker + Container
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 405bd9830f9298184122beff64a167a7
        run: npx --yes wrangler@4 deploy
        working-directory: infra/cf
