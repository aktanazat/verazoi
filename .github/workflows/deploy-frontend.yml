name: Deploy Frontend

on:
  push:
    branches: [main]
    paths: [frontend/**, .github/workflows/deploy-frontend.yml]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - name: Verify CF token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "token length: ${#CLOUDFLARE_API_TOKEN}"
          curl -s -o /tmp/v.json -w "verify_status: %{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          jq '.success, .errors, .result.status' /tmp/v.json
          curl -s -o /tmp/p.json -w "project_status: %{http_code}\n" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/405bd9830f9298184122beff64a167a7/pages/projects/verazoi"
          jq '.success, .errors, .result.name' /tmp/p.json
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 405bd9830f9298184122beff64a167a7
        run: npx --yes wrangler@4 pages deploy frontend/out --project-name=verazoi --branch=main --commit-dirty=true
